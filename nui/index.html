<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Politi Garage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <svg class="glass-filters" aria-hidden="true">
        <filter id="glass-distortion">
            <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="28" />
        </filter>
        <symbol id="icon-cat-active" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="1.4" fill="none" />
            <circle cx="12" cy="12" r="3" fill="currentColor" />
        </symbol>
        <symbol id="icon-cat-marked" viewBox="0 0 24 24">
            <rect x="4" y="10" width="16" height="7" rx="2" stroke="currentColor" stroke-width="1.4" fill="none" />
            <circle cx="8" cy="17" r="1.6" fill="currentColor" />
            <circle cx="16" cy="17" r="1.6" fill="currentColor" />
            <path d="M7 10V8.5C7 7.1 8.1 6 9.5 6h5A2.5 2.5 0 0 1 17 8.5V10" stroke="currentColor" stroke-width="1.4" fill="none" />
        </symbol>
        <symbol id="icon-cat-mc" viewBox="0 0 24 24">
            <circle cx="7" cy="16" r="2.2" stroke="currentColor" stroke-width="1.4" fill="none" />
            <circle cx="17" cy="16" r="2.2" stroke="currentColor" stroke-width="1.4" fill="none" />
            <path d="M9 16h5.2c1 0 1.8-.8 1.8-1.8 0-.6-.3-1.1-.7-1.4l-3.2-2.2-2.2 2.4L8 13" stroke="currentColor" stroke-width="1.4" fill="none" />
        </symbol>
        <symbol id="icon-cat-civil" viewBox="0 0 24 24">
            <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.4" fill="none" />
            <path d="M7 18.5C7.8 16.2 9.7 15 12 15s4.2 1.2 5 3.5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" />
        </symbol>
        <symbol id="icon-cat-special" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="1.4" fill="none" />
            <path d="M12 8v4l2.5 2.5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" />
        </symbol>
    </svg>
</head>
<body>
    <div id="overlay" class="overlay hidden">
        <div class="garage-shell">
            <header class="garage-header">
                <div class="header-left">
                    <div class="header-logo"></div>
                    <div class="header-text">
                        <div class="header-title">POLITI GARAGE</div>
                        <div class="header-subtitle" id="garage-label">Central Station</div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="header-status-pill">
                        <span class="status-dot"></span>
                        <span class="status-text">System online</span>
                    </div>
                    <button class="icon-button icon-button-ghost theme-toggle" id="theme-toggle" aria-label="Skift tema">
                        <span class="theme-toggle-icon"></span>
                    </button>
                    <div class="header-clock" id="header-clock"></div>
                    <button class="icon-button icon-button-ghost" id="close-button" aria-label="Luk">
                        <span class="icon-close"></span>
                    </button>
                </div>
            </header>
            <main class="garage-main">
                <aside class="sidebar">
                    <nav class="sidebar-nav" id="sidebar-nav">
                    </nav>
                    <div class="sidebar-footer">
                        <div class="sidebar-badge">
                            <span class="badge-label">THOM PRODUCTIONS</span>
                            <span class="badge-meta">GARAGE</span>
                        </div>
                    </div>
                </aside>
                <section class="content">
                    <div class="content-toolbar">
                        <div class="toolbar-left">
                            <div class="toolbar-title" id="toolbar-title">Aktive Enheder</div>
                            <div class="toolbar-meta" id="toolbar-meta">0 køretøjer</div>
                        </div>
                        <div class="toolbar-right">
                            <div class="toolbar-search">
                                <input id="search-input" type="text" placeholder="Søg efter køretøj, kaldesignal eller kategori">
                            </div>
                        </div>
                    </div>
                    <div class="vehicles-scroll">
                        <div class="vehicles-grid" id="vehicles-grid">
                        </div>
                    </div>
                </section>
            </main>
        </div>
        <div class="modal-backdrop hidden" id="spawn-modal-backdrop">
            <div class="modal" id="spawn-modal">
                <div class="modal-header">
                    <div class="modal-title">Bekræft køretøj</div>
                    <div class="modal-subtitle" id="modal-vehicle-name"></div>
                </div>
                <div class="modal-body">
                    <div class="modal-field">
                        <label for="unit-category">Kategori</label>
                            <div class="select-wrapper">
                                <select id="unit-category" class="native-select"></select>
                                <button type="button" class="select-display" id="unit-category-display">
                                    <span class="select-display-label">Vælg kategori</span>
                                </button>
                                <div class="select-options" id="unit-category-options"></div>
                            </div>
                    </div>
                    <div class="modal-field">
                        <label for="unit-number">Enhedsnummer</label>
                            <div class="select-wrapper">
                                <input id="unit-number" type="number" min="1" max="99" value="1">
                                <div class="number-arrow-wrapper">
                                    <div class="number-arrow number-arrow-up"></div>
                                    <div class="number-arrow number-arrow-down"></div>
                                </div>
                            </div>
                        <div class="field-hint">Mellem 1 og 99</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-ghost" id="modal-cancel">Annuller</button>
                    <button class="btn btn-primary" id="modal-confirm">Spawn køretøj</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
